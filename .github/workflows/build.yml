name: Build

on: [ push, pull_request ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_ROLL_FORWARD: Major

jobs:

  Build_Test_Package:

    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        configuration: [Release]

    env:
      TestResults_ArtifactName: TestResults_${{ matrix.configuration }}
      Packages_ArtifactName: Packages_${{ matrix.configuration }}

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Prepare NuGet Local Package Sources
        env:
          NuGetPackageSourceKeyPrefix: Repository Package Artifacts
        run: |
          $NuGetConfigFilePath = Join-Path $env:GITHUB_WORKSPACE "nuget.config"

          if (-not (Test-Path -LiteralPath $NuGetConfigFilePath)) {
              throw "Missing '$NuGetConfigFilePath'."
          }

          [xml] $NuGetConfig = Get-Content -LiteralPath $NuGetConfigFilePath

          $PackageSources = @($NuGetConfig.configuration.packageSources.add |
              Where-Object {
                  $PackageSourceKey = [string] $_.key
                  $PackageSourceKey -eq $env:NuGetPackageSourceKeyPrefix -or
                  $PackageSourceKey.StartsWith("$env:NuGetPackageSourceKeyPrefix (")
              })

          if ($PackageSources.Count -eq 0) {
              throw "Missing NuGet package sources with key prefix '$env:NuGetPackageSourceKeyPrefix' in '$NuGetConfigFilePath'."
          }

          $NuGetConfigFolderPath = Split-Path -Parent $NuGetConfigFilePath

          foreach ($PackageSource in $PackageSources) {
              $PackageSourceKey = [string] $PackageSource.key
              $PackageSourceValue = [string] $PackageSource.value

              if ([string]::IsNullOrWhiteSpace($PackageSourceValue)) {
                  throw "NuGet package source '$PackageSourceKey' has an empty value in '$NuGetConfigFilePath'."
              }

              $PackageSourceUri = $null
              $IsAbsoluteUri = [System.Uri]::TryCreate(
                  $PackageSourceValue,
                  [System.UriKind]::Absolute,
                  [ref] $PackageSourceUri
              )

              if ($IsAbsoluteUri -and $PackageSourceUri.Scheme -ne "file") {
                  Write-Host "Skipping non-local NuGet package source '$PackageSourceKey': $PackageSourceValue"
                  continue
              }

              if ($IsAbsoluteUri -and $PackageSourceUri.Scheme -eq "file") {
                  $PackageSourceFolderPath = $PackageSourceUri.LocalPath
              }
              elseif ([System.IO.Path]::IsPathRooted($PackageSourceValue)) {
                  $PackageSourceFolderPath = [System.IO.Path]::GetFullPath($PackageSourceValue)
              }
              else {
                  $PackageSourceFolderPath = [System.IO.Path]::GetFullPath(
                      [System.IO.Path]::Combine($NuGetConfigFolderPath, $PackageSourceValue)
                  )
              }

              if (-not (Test-Path -LiteralPath $PackageSourceFolderPath)) {
                  New-Item -ItemType Directory -Path $PackageSourceFolderPath -Force | Out-Null
              }

              Write-Host "Prepared NuGet package source '$PackageSourceKey': $PackageSourceFolderPath"
          }
        shell: pwsh

      - name: Build, Test, and Package
        run: |
          call "%GITHUB_WORKSPACE%\BuildPackages.cmd" --configuration "${{ matrix.configuration }}"
          if errorlevel 1 exit /b %errorlevel%
        shell: cmd

      - name: Upload Package Artifacts
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: ${{ env.Packages_ArtifactName }}
          path: ${{ github.workspace }}\artifacts\packages\${{ matrix.configuration }}
          if-no-files-found: warn

      - name: Upload Test Results Artifacts
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: ${{ env.TestResults_ArtifactName }}
          path: ${{ github.workspace }}\artifacts\testresults\${{ matrix.configuration }}
          if-no-files-found: warn
